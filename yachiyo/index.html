<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Yachiyo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000; 
            overflow: hidden;
            touch-action: none; 
        }
        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            
            object-fit: fill; 
            
            pointer-events: none; 
        }

        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            z-index: 999;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="start-overlay">Tap</div>

    <div id="video-container">
        <video id="myVideo" playsinline webkit-playsinline preload="auto"></video>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const startOverlay = document.getElementById('start-overlay');
        const container = document.getElementById('video-container');

        let currentState = 'ready';

        const randomVideos = [];
        for (let i = 1; i <= 22; i++) {
            randomVideos.push(i + '.mp4');
        }

        startOverlay.addEventListener('click', () => {
            startOverlay.style.display = 'none';
            playNull();
        });

        function playNull() {
            currentState = 'null';
            video.src = 'Null.mp4';
            video.loop = false;
            video.play();
        }

        function playLoopingVideo() {
            currentState = 'looping';
            video.src = '0.mp4';
            video.loop = true; 
            video.play();
        }

        function playRandomVideo() {
            currentState = 'random';
            const randomIndex = Math.floor(Math.random() * randomVideos.length);
            video.src = randomVideos[randomIndex];
            video.loop = false;
            video.play();
        }

        video.addEventListener('ended', () => {
            if (currentState === 'null') {
                playLoopingVideo();
            } else if (currentState === 'random') {
                playLoopingVideo();
            }
        });

        container.addEventListener('click', () => {
            if (currentState === 'looping') {
                playRandomVideo();
            }
        });
    </script>

</body>
</html>
